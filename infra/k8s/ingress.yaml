apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pms-api
  namespace: pms
spec:
  ingressClassName: gce
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
