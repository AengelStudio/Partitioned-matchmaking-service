apiVersion: v1
kind: Service
metadata:
  name: callback-dispatcher-metrics
  namespace: pms
spec:
  selector:
    app: callback-dispatcher
  ports:
    - port: 9091
      targetPort: 9091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: callback-dispatcher
  namespace: pms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: callback-dispatcher
  template:
    metadata:
      labels:
        app: callback-dispatcher
    spec:
      containers:
        - name: callback-dispatcher
          image: pms:local
          command: ["python", "-m", "app.callback_dispatcher.main"]
          ports:
            - containerPort: 9091
          env:
            - name: CALLBACK_DISPATCHER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: pms-config
            - secretRef:
                name: pms-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
