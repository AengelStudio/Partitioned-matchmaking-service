apiVersion: batch/v1
kind: Job
metadata:
  name: pms-migrate
  namespace: pms
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: pms:local
          command: ["python", "-m", "app.db.init"]
          envFrom:
            - configMapRef:
                name: pms-config
            - secretRef:
                name: pms-secrets
