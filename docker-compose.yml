services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "log_min_messages=warning"]
    environment:
      POSTGRES_USER: pms
      POSTGRES_PASSWORD: pms
      POSTGRES_DB: pms
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: python -m app.db.init
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --log-level error --no-access-log
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["sh", "-c", "WORKER_ID=$$(hostname) python -m app.worker.main"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  callback-dispatcher:
    build: .
    command: python -m app.callback_dispatcher.main
    env_file: .env
    ports:
      - "9091:9091"
    depends_on:
      migrate:
        condition: service_completed_successfully

  mock-callback:
    build: .
    command: uvicorn app.mock_callback.main:app --host 0.0.0.0 --port 9000 --log-level error --no-access-log
    env_file: .env
    ports:
      - "9000:9000"
